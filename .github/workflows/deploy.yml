name: CD Pipeline (Deploy - Azure)

on:
  workflow_run:
    workflows: ["SimpleBank CI Pipeline"]
    types:
      - completed

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Azure Login
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # ✅ Login to ACR
    - name: Login to Azure Container Registry
      run: |
        az acr login --name selvaacr2026

    # ✅ Build & Push Customer API
    - name: Build & Push Customer API
      run: |
        docker build -t customer-api -f SimpleBank.Customer.Api/Dockerfile .
        docker tag customer-api:latest selvaacr2026.azurecr.io/customer-api:v1-${{ github.run_number }}
        docker push selvaacr2026.azurecr.io/customer-api:v1-${{ github.run_number }}

    # ✅ Build & Push Account API
    - name: Build & Push Account API
      run: |
        docker build -t account-api -f SimpleBank.Accounts.Api/Dockerfile .
        docker tag account-api:latest selvaacr2026.azurecr.io/account-api:v1-${{ github.run_number }}
        docker push selvaacr2026.azurecr.io/account-api:v1-${{ github.run_number }}

    # ✅ Build & Push Transaction API
    - name: Build & Push Transaction API
      run: |
        docker build -t transaction-api -f SimpleBank.Transactions.Api/Dockerfile .
        docker tag transaction-api:latest selvaacr2026.azurecr.io/transaction-api:v1-${{ github.run_number }}
        docker push selvaacr2026.azurecr.io/transaction-api:v1-${{ github.run_number }}

    # ✅ ✅ NEW ✅ Build & Push Gateway
    - name: Build & Push Gateway
      run: |
        docker build -t gateway -f GateWay/Dockerfile .
        docker tag gateway:latest selvaacr2026.azurecr.io/gateway:v1-${{ github.run_number }}
        docker push selvaacr2026.azurecr.io/gateway:v1-${{ github.run_number }}

    # ✅ Build & Push React UI
    - name: Build & Push React UI
      run: |
        docker build -t react-ui ./ReactUI/simplebank-ui
        docker tag react-ui:latest selvaacr2026.azurecr.io/react-ui:v1-${{ github.run_number }}
        docker push selvaacr2026.azurecr.io/react-ui:v1-${{ github.run_number }}

    # ✅ UPDATE IMAGE TAGS IN K8S YAML
    - name: Update Image Tags in Kubernetes YAML
      run: |
        sed -i "s|customer-api:.*|customer-api:v1-${{ github.run_number }}|g" k8s/customer-deployment.yaml
        sed -i "s|account-api:.*|account-api:v1-${{ github.run_number }}|g" k8s/account-deployment.yaml
        sed -i "s|transaction-api:.*|transaction-api:v1-${{ github.run_number }}|g" k8s/transaction-deployment.yaml
        sed -i "s|gateway:.*|gateway:v1-${{ github.run_number }}|g" k8s/gateway-deployment.yaml
        sed -i "s|react-ui:.*|react-ui:v1-${{ github.run_number }}|g" k8s/webui-deployment.yaml

    # ✅ Connect to AKS
    - name: Get AKS Credentials
      run: |
        az aks get-credentials --resource-group myRG --name myAKSCluster --overwrite-existing

    # ✅ Deploy to AKS
    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/

    # ✅ Annotate deployments
    - name: Annotate deployment changes
      run: |
        kubectl annotate deployment customer-api kubernetes.io/change-cause="customer-api:v1-${{ github.run_number }}" --overwrite
        kubectl annotate deployment account-api kubernetes.io/change-cause="account-api:v1-${{ github.run_number }}" --overwrite
        kubectl annotate deployment transaction-api kubernetes.io/change-cause="transaction-api:v1-${{ github.run_number }}" --overwrite
        kubectl annotate deployment gateway kubernetes.io/change-cause="gateway:v1-${{ github.run_number }}" --overwrite
        kubectl annotate deployment web-ui kubernetes.io/change-cause="react-ui:v1-${{ github.run_number }}" --overwrite

    # ✅ Restart Pods
    - name: Restart deployments
      run: |
        kubectl rollout restart deployment customer-api
        kubectl rollout restart deployment account-api
        kubectl rollout restart deployment transaction-api
        kubectl rollout restart deployment gateway
        kubectl rollout restart deployment web-ui