name: CD Pipeline (Deploy)

on:
  workflow_run:
    workflows: ["SimpleBank CI Pipeline"]
    types:
      - completed

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    # ✅ Login to ECR
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ap-southeast-1 \
        | docker login --username AWS --password-stdin 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com

    # ✅ Build & Push Customer API
    - name: Build & Push Customer API
      run: |
        docker build -t customer-api -f SimpleBank.Customer.Api/Dockerfile .
        docker tag customer-api:latest 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/customer-api:latest
        docker push 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/customer-api:latest

    # ✅ Build & Push Account API
    - name: Build & Push Account API
      run: |
        docker build -t account-api -f SimpleBank.Accounts.Api/Dockerfile .
        docker tag account-api:latest 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/account-api:latest
        docker push 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/account-api:latest

    # ✅ Build & Push Transaction API
    - name: Build & Push Transaction API
      run: |
        docker build -t transaction-api -f SimpleBank.Transactions.Api/Dockerfile .
        docker tag transaction-api:latest 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/transaction-api:latest
        docker push 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/transaction-api:latest

    # ✅ Build & Push React UI
    - name: Build & Push React UI
      run: |
        docker build -t react-ui ./ReactUI/simplebank-ui
        docker tag react-ui:latest 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/react-ui:latest
        docker push 175562787706.dkr.ecr.ap-southeast-1.amazonaws.com/react-ui:latest

    # ✅ Deploy to Kubernetes
    - name: Deploy to EKS
      run: |
        aws eks update-kubeconfig --region ap-southeast-1 --name simplebank-cluster
        kubectl apply -f k8s/

    # ✅ Force rollout (VERY IMPORTANT)
    - name: Restart deployments
      run: |
        kubectl rollout restart deployment customer-api
        kubectl rollout restart deployment account-api
        kubectl rollout restart deployment transaction-api
        kubectl rollout restart deployment gateway
        kubectl rollout restart deployment web-ui